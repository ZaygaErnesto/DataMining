name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Run black (check only)
        run: black --check src/ tests/

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'data') || github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate data
        run: |
          python -c "
          import sys
          try:
              from src.data_loader import validate_data, load_dataset
              df = load_dataset('data/ai4i2020.csv')
              report = validate_data(df)
              print('Data validation report:', report)
              if report.get('has_missing'):
                  print('WARNING: Data has missing values')
                  sys.exit(1)
              print('Data validation passed.')
          except FileNotFoundError:
              print('Data file not found — skipping validation in CI.')
          except Exception as e:
              print(f'Data validation failed: {e}')
              sys.exit(1)
          "
